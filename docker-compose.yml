services:
  postgres:
    image: postgres:16-alpine
    container_name: singularity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: singularity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - singularity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d singularity"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  singularity-postgres-data:
